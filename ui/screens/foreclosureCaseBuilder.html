<div class="table-screen">
  <h2>בניית תיק עיקולים</h2>

  <div class="case-builder-summary">
    <span>תיקים במצב עיקול שעדיין לא נפתח להם תיק עיקול</span>
  </div>

  <div class="foreclosure-manual-open">
    <label for="manualForeclosureCase">פתיחת תיק עיקול לתיק שאינו במצב עיקול</label>
    <select id="manualForeclosureCase"></select>
    <button class="btn btn--secondary" type="button" onclick="openManualForeclosureCase()">פתיחת תיק עיקול</button>
  </div>

  <div class="table-scroll" dir="rtl">
    <table class="table table--striped table--hover">
        <thead>
        <tr>
            <th>מספר תיק</th>
            <th>משלם</th>
            <th>נכס</th>
            <th>מסלול</th>
            <th>קבוצה</th>
            <th>מצב</th>
            <th>פעולה</th>
        </tr>
        </thead>
        <tbody id="foreclosureCaseBuilderTable"></tbody>
    </table>
  </div>
</div>
