<div class="actions-bar">
  <button id="exportExcelBtn" class="btn btn--excel">
      הורד כקובץ Excel 📥
  </button>

  <button id="printBtn" class="btn btn--pdf">
      הורד כקובץ PDF 📄
  </button>
</div>

<div class="history-container">
  <h2>היסטוריית פעולות</h2>

  <!-- אזור סינון -->
  <div class="history-filters muni-filters">
    <select id="filterUser">
      <option value="">כל המשתמשים</option>
    </select>

    <select id="filterAction">
      <option value="">כל הפעולות</option>
    </select>

    <input type="date" id="filterFromDate">
    <input type="date" id="filterToDate">

    <button class="btn btn--secondary" onclick="applyHistoryFilters()">סינון</button>
    <button class="btn btn--secondary" onclick="resetHistoryFilters()">איפוס</button>
  </div>

  <!-- טבלה -->
  <div class="table-scroll" dir="rtl">
    <table class="table table--history table--striped table--hover">
      <thead>
        <tr>
          <th>פעולה</th>
          <th>משתמש</th>
          <th>לפני השינוי</th>
          <th>אחרי השינוי</th>
          <th>זמן</th>
        </tr>
      </thead>
      <tbody id="historyTableBody">
      </tbody>
    </table>
  </div>
</div>
