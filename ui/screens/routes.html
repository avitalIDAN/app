<div class="actions-bar">
  <button id="exportExcelBtn" class="btn btn--secondary">
    הורד כקובץ Excel
  </button>

  <button id="printBtn" class="btn btn--secondary">
    הורד כקובץ PDF
  </button>
</div>

<div class="routes-screen">
  <h2>מסלולים</h2>

  <div class="filters-bar">
    <label>
      <b>קוד מסלול</b>
      <input id="routeCodeInput" type="text" placeholder="לדוגמה FAST">
    </label>

    <label>
      <b>שם מסלול</b>
      <input id="routeNameInput" type="text" placeholder="שם מסלול">
    </label>

    <label>
      <b>תיאור</b>
      <input id="routeDescriptionInput" type="text" placeholder="תיאור">
    </label>

    <button id="addRouteBtn" class="btn btn--primary" onclick="addRoute()">
      הוספה
    </button>
  </div>

  <div class="table-scroll" dir="rtl">
    <table class="table table--route table--striped table--hover">
      <thead>
        <tr>
          <th>מזהה</th>
          <th>קוד מסלול</th>
          <th>שם מסלול</th>
          <th>תיאור</th>
          <th>פעיל</th>
          <th>פעולות</th>
        </tr>
      </thead>
      <tbody id="routesTable"></tbody>
    </table>
  </div>
</div>
