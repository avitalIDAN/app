<h2>מעבר מצבים ומכתבים</h2>

<div class="filters-bar">
  <select id="routeFilter"></select>
</div>

<div class="filters-bar">
  <label>
    <b>מצב נוכחי</b>
    <select id="statusFilter" disabled></select>

  <label>

  <button id="changeStatusBtn" onclick="changeCaseStatus()">שינוי מצב בתיקים</button>

<table class="table table--switch table--striped table--hover">

      <th>מספר תיק</th>

      <th>סטטוס נוכחי</th>

      <th>החרגה</th>
      <th>סגירה</th>
      <th>מעבר לתיק</th>

  </thead>
  <tbody id="casesTable"></tbody>
</table>
