<div class="table-screen">
  <h2>תהליך עיקול וביצוע מעקב</h2>

  <div class="case-builder-summary">
    <span>כל פעולה מוסיפה שורה חדשה וממתינה לחיתום הבא לפני שליחה לבנק</span>
  </div>

  <section id="foreclosureRequestPanel" class="foreclosure-request-panel" hidden>
    <h3 id="foreclosureRequestTitle"></h3>
    <p id="foreclosureRequestCase"></p>
    <div class="foreclosure-form-fields">
      <label>בנק<select id="foreclosureBank"><option value="">בחירת בנק</option><option>בנק לאומי</option><option>בנק הפועלים</option><option>מזרחי טפחות</option><option>הבנק הבינלאומי</option></select></label>
      <label>סכום<input id="foreclosureAmount" type="number" min="1" step="0.01" /></label>
    </div>
    <div class="foreclosure-form-actions"><button class="btn btn--destructive" type="button" onclick="submitForeclosureRequest()">הוספת שורה לחיתום</button><button class="btn btn--secondary" type="button" onclick="closeForeclosureRequestPanel()">ביטול</button></div>
  </section>

  <div class="table-scroll" dir="rtl">
    <table class="table table--striped table--hover">
        <thead>
        <tr>
            <th>תיק עיקול</th>
            <th>מספר תיק</th>
            <th>משלם</th>
            <th>סטטוס עיקול</th>
            <th>פעולות</th>
        </tr>
        </thead>
        <tbody id="foreclosureProcessTable"></tbody>
    </table>
    </div>
</div>
