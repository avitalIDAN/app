<div class="dashboard-container">
  <div class="dashboard-header">
    <div class="dashboard-welcome">
      <span class="dashboard-eyebrow">מרכז בקרה</span>
      <h1>ברוכים הבאים למערכת אכיפה</h1>
      <p>תמונת מצב עדכנית של ניהול התיקים והפעילות האחרונה.</p>
    </div>
  </div>

  <div class="stats-cards">
    <div class="card muni-card">
      <h3>סך כל התיקים</h3>
      <p id="totalCases">0</p>
    </div>
    <div class="card muni-card">
      <h3>תיקים בתהליך</h3>
      <p id="casesInProcess">0</p>
    </div>
    <div class="card muni-card">
      <h3>תיקים סגורים</h3>
      <p id="closedCases">0</p>
    </div>
  </div>

  <section class="recent-activity muni-table-card" aria-labelledby="recentActivityTitle">
    <h3 id="recentActivityTitle">פעילות אחרונה</h3>
    <div class="table-scroll" dir="rtl">
    <table id="recentCases" class="table data-table table--compact table--hover" aria-label="פעילות אחרונה">
      <thead>
        <tr>
          <th>פעולה</th>
          <th>ע"י משתמש</th>
          <th>ערך ישן</th>
          <th>ערך חדש</th>
          <th>זמן</th>
        </tr>
      </thead>
      <tbody>
        <!-- יתעדכן דינמית -->
      </tbody>
    </table>
    </div>
  </section>
</div>
